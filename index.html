<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{ AR 8thWall ~ Three.js } Vite App ⚡️</title>

    <!-- XR Extras - provides utilities like load screen, almost there, and error handling.
         See github.com/8thwall/web/tree/master/xrextras -->
    <script src="//cdn.8thwall.com/web/xrextras/xrextras.js"></script>

    <!-- 8thWall Web - Replace the app key here with your own app key -->
    <script
      async
      src="//apps.8thwall.com/xrweb?appKey=2K5kXwrCBWRleTzkkxLqzoJL3eyhsslSXJJVvhld1kkSAHknbwckSQUye10YuJ5CXRb3o2"
    ></script>
  </head>
  <body>
    <!-- <div class="audio-container">
      <audio id="audio-controller" controls></audio>
    </div> -->

    <div class="audio-container">
      <div id="toggleAudioPlayer"></div>
      <div id="audioPlayer">
        <!-- Top Info -->
        <div id="title">
          <div id="timer">0:00</div>
          <span id="track"></span>
          <div id="duration">0:00</div>
        </div>

        <div id="progress">
          <div id="progressBar"></div>
        </div>

        <!-- Controls -->
        <div class="controlsOuter">
          <div class="btn" id="playlistBtn"></div>

          <div class="controlsInner">
            <div class="btn" id="prevBtn"></div>
            <div class="btn" id="playBtn"></div>
            <div class="btn" id="pauseBtn"></div>
            <div id="loading"></div>
            <div class="btn" id="nextBtn"></div>
          </div>

          <div class="btn" id="volumeBtn"></div>
        </div>

        <!-- Volume: not used on mobile -->
        <div id="volume" class="fadeout">
          <div id="barFull" class="bar"></div>
          <div id="barEmpty" class="bar"></div>
          <div id="sliderBtn"></div>
        </div>
      </div>
    </div>

    <!-- Playlist -->
    <div id="playlist">
      <div id="list"></div>
    </div>

    <canvas id="experience"></canvas>
    <script type="module" src="/js/index.js"></script>
  </body>
</html>
